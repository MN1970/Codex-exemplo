# Alembic Configuration File for Portal Master
# This file contains the Alembic configuration for database migrations

# SQLAlchemy database URL (will be read from environment in env.py)
# For development: sqlite:///./data/portal.db
# For production: postgresql://user:password@localhost/portal
sqlalchemy.url =

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with an ordering scheme
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is interpreted as a datetime.datetime tzinfo object.
# Leave blank for localtime.
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by Alembic.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be loaded for import
# useful for packaged apps that may not have .py files
# available at import time. Oracle 8k CHAR datatypes
# will just use the TextClause implementation and so
# will generate the exact DDL sent -- sqlite DML is
# insufficiently Unicode aware
# treat_as_varchar = false

# set the location of migration files
# see https://alembic.sqlalchemy.org/en/latest/config.html#the-location-of-migration-files
# file_template = %%(rev)s_%%(slug)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
