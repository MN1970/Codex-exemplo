name: CAG Shadow Mode Tests

on:
  push:
    branches:
      - claude/manta-maestro-cag-ml-*
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest cag/tests/ -v --tb=short

      - name: Run pylint
        run: |
          pylint cag/shadow_mode/ --max-line-length=120 || true

      - name: Run mypy
        run: |
          mypy cag/shadow_mode/ --ignore-missing-imports || true
