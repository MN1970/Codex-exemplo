# =====================================================================
# AKP Daily Cron — evolução natural do Academic Knowledge Pipeline
# =====================================================================
#
# Ticket: MNT-2026-AKP-CRON (v4.5+)
#
# Vetor 4 do backlog do Manta Maestro: agenda a execução periódica da
# função `promote_gaps_to_backlog()` (definida em
# supabase/migrations/2026_07_12_akp_governance_v4_5.sql) para que os
# gaps detectados pela view `v_akp_gap_candidates` (queries repetidas
# com top-1 fraco no RAG academic-knowledge) virem tickets
# `AKP-002-NNNNN` em `akp_curation_backlog` de forma automática — em
# vez de depender de MN rodar `SELECT promote_gaps_to_backlog();` na
# mão.
#
# Também gera um relatório JSON diário do estado do pipeline
# (delegado ao script `scripts/akp_report.py` do repo manta-hub) para
# rastreabilidade.
#
# ---------------------------------------------------------------------
# SETUP NECESSÁRIO (uma vez, no repositório GitHub)
# ---------------------------------------------------------------------
#
# 1) Secrets do repositório (Settings → Secrets and variables → Actions):
#
#      SUPABASE_URL
#        URL do projeto Supabase (ex.: https://xxx.supabase.co).
#
#      SUPABASE_SERVICE_ROLE_KEY
#        Service role key (NÃO a anon key). Permissões necessárias:
#        - EXECUTE em `promote_gaps_to_backlog(integer, float)`
#        - SELECT em `akp_curation_backlog` e `v_akp_gap_candidates`
#        A service role key já tem tudo isso por default.
#
#      MANTA_HUB_READ_TOKEN  (opcional — só se manta-hub for privado)
#        PAT (fine-grained) com escopo `contents: read` no repo
#        `viniciusmagnos/manta-hub`. Se não estiver setado, o job
#        `daily-report` degrada graciosamente (continue-on-error).
#
# 2) Permissões do GITHUB_TOKEN default:
#      - `issues: write`   — para abrir issues quando ≥5 gaps novos
#      - `contents: read`  — checkout deste repo
#    Já garantidas no bloco `permissions:` abaixo.
#
# ---------------------------------------------------------------------
# QUANDO RODA
# ---------------------------------------------------------------------
# - Diariamente às 08:00 UTC (05:00 BRT), horário em que a curadoria
#   humana do dia anterior já foi consolidada e há tempo hábil de
#   triar novos gaps antes do fim do dia útil.
# - Manualmente via `workflow_dispatch` (aba Actions → Run workflow).
#
# ---------------------------------------------------------------------

name: AKP daily cron (WF-AKP-002)

on:
  schedule:
    # 08:00 UTC = 05:00 BRT (America/Sao_Paulo, UTC-3)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      min_occurrences:
        description: "Nº mínimo de ocorrências p/ promover a ticket"
        required: false
        default: "3"
      max_top_sim:
        description: "Similaridade top-1 máxima (float 0..1)"
        required: false
        default: "0.30"

permissions:
  contents: read
  issues: write

concurrency:
  group: akp-daily-cron
  cancel-in-progress: false

jobs:
  # ===================================================================
  # Job 1 — Promove gaps recorrentes em tickets AKP-002-NNNNN.
  # Chama a RPC `promote_gaps_to_backlog` via PostgREST do Supabase.
  # ===================================================================
  promote-gaps:
    name: Promote v_akp_gap_candidates → akp_curation_backlog
    runs-on: ubuntu-latest
    outputs:
      created_count: ${{ steps.promote.outputs.created_count }}
      updated_count: ${{ steps.promote.outputs.updated_count }}
      created_tickets: ${{ steps.promote.outputs.created_tickets }}
      report_date: ${{ steps.promote.outputs.report_date }}

    steps:
      - name: Checkout Codex-exemplo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install httpx
        run: pip install --quiet 'httpx>=0.27,<1'

      - name: Call promote_gaps_to_backlog RPC
        id: promote
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIN_OCCURRENCES: ${{ github.event.inputs.min_occurrences || '3' }}
          MAX_TOP_SIM: ${{ github.event.inputs.max_top_sim || '0.30' }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_URL ou SUPABASE_SERVICE_ROLE_KEY não configurados."
            echo "Configure em Settings → Secrets and variables → Actions."
            exit 1
          fi

          python <<'PY'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          import httpx

          url = os.environ["SUPABASE_URL"].rstrip("/")
          key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          min_occ = int(os.environ.get("MIN_OCCURRENCES", "3"))
          max_sim = float(os.environ.get("MAX_TOP_SIM", "0.30"))

          endpoint = f"{url}/rest/v1/rpc/promote_gaps_to_backlog"
          headers = {
              "apikey": key,
              "Authorization": f"Bearer {key}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }
          body = {"min_occurrences": min_occ, "max_top_sim": max_sim}

          print(f"POST {endpoint}")
          print(f"body: {body}")
          resp = httpx.post(endpoint, json=body, headers=headers, timeout=60.0)
          resp.raise_for_status()
          rows = resp.json()
          if not isinstance(rows, list):
              rows = [rows]

          created = [r for r in rows if r.get("action") == "created"]
          updated = [r for r in rows if r.get("action") == "updated"]

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          report = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "min_occurrences": min_occ,
              "max_top_sim": max_sim,
              "created_count": len(created),
              "updated_count": len(updated),
              "created": created,
              "updated": updated,
          }

          out_path = f"gap-promotion-{today}.json"
          with open(out_path, "w", encoding="utf-8") as fh:
              json.dump(report, fh, indent=2, ensure_ascii=False)

          created_ids = [r.get("ticket_id", "") for r in created]

          # GitHub Actions outputs
          gha_out = os.environ["GITHUB_OUTPUT"]
          with open(gha_out, "a", encoding="utf-8") as fh:
              fh.write(f"created_count={len(created)}\n")
              fh.write(f"updated_count={len(updated)}\n")
              fh.write(f"report_date={today}\n")
              fh.write(f"report_path={out_path}\n")
              # Encode list as CSV para uso simples em passos subsequentes
              fh.write(f"created_tickets={','.join(created_ids)}\n")

          print("=" * 60)
          print(f"created: {len(created)}  updated: {len(updated)}")
          for r in created:
              print(f"  + {r.get('ticket_id')}  [{r.get('segmento')}]  {r.get('query_text')}")
          for r in updated:
              print(f"  ~ {r.get('ticket_id')}  [{r.get('segmento')}]  {r.get('query_text')}")
          print("=" * 60)
          PY

      - name: Upload gap promotion artifact
        uses: actions/upload-artifact@v4
        with:
          name: akp-gap-promotion-${{ steps.promote.outputs.report_date }}
          path: gap-promotion-*.json
          retention-days: 90
          if-no-files-found: error

      - name: Open GitHub issue if ≥5 new tickets
        if: fromJSON(steps.promote.outputs.created_count) >= 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CREATED_TICKETS: ${{ steps.promote.outputs.created_tickets }}
          CREATED_COUNT: ${{ steps.promote.outputs.created_count }}
          REPORT_DATE: ${{ steps.promote.outputs.report_date }}
        run: |
          set -euo pipefail
          # Constrói corpo da issue listando os tickets recém-criados
          {
            echo "## AKP-002 — spike de gaps detectados"
            echo ""
            echo "O cron diário (\`.github/workflows/akp-daily-cron.yml\`) promoveu"
            echo "**${CREATED_COUNT}** novos tickets \`AKP-002-*\` em \`akp_curation_backlog\`."
            echo ""
            echo "Threshold de alerta: **≥5 novos tickets/dia**."
            echo ""
            echo "### Tickets criados"
            echo ""
            IFS=',' read -r -a tickets <<< "${CREATED_TICKETS}"
            for t in "${tickets[@]}"; do
              [ -n "$t" ] && echo "- \`$t\`"
            done
            echo ""
            echo "### Próximos passos"
            echo ""
            echo "1. Abrir Supabase Studio → tabela \`akp_curation_backlog\`, status=\`triage\`."
            echo "2. MN valida se são gaps reais (\`accepted\`) ou queries mal-formuladas (\`rejected\`)."
            echo "3. Encaminhar \`accepted\` para curadoria acadêmica (WF-AKP-002)."
            echo ""
            echo "Relatório completo: artifact \`akp-gap-promotion-${REPORT_DATE}\`."
            echo ""
            echo "_Auto-gerado por \`akp-daily-cron.yml\` @ $(date -u +%FT%TZ)._"
          } > issue-body.md

          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "[akp-gap] Spike de gaps AKP-002 em ${REPORT_DATE} (${CREATED_COUNT} novos)" \
            --label "akp-gap" \
            --body-file issue-body.md

  # ===================================================================
  # Job 2 — Relatório diário do estado do pipeline.
  # Requer o repo `manta-hub` como checkout paralelo (script vive lá).
  # Degrada gracioso se o token de leitura não estiver configurado.
  # ===================================================================
  daily-report:
    name: Daily AKP report (manta-hub/scripts/akp_report.py)
    runs-on: ubuntu-latest
    needs: promote-gaps
    continue-on-error: true

    steps:
      - name: Checkout Codex-exemplo
        uses: actions/checkout@v4

      - name: Checkout manta-hub (contains scripts/akp_report.py)
        id: checkout_hub
        uses: actions/checkout@v4
        with:
          repository: viniciusmagnos/manta-hub
          path: manta-hub
          token: ${{ secrets.MANTA_HUB_READ_TOKEN }}
          # `continue-on-error: true` no job cobre o caso do secret
          # não existir (repo privado sem token → checkout falha).

      - name: Setup Python
        if: steps.checkout_hub.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install httpx
        if: steps.checkout_hub.outcome == 'success'
        run: pip install --quiet 'httpx>=0.27,<1'

      - name: Run akp_report.py --json
        if: steps.checkout_hub.outcome == 'success'
        id: report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          today="${{ needs.promote-gaps.outputs.report_date }}"
          if [ -z "$today" ]; then
            today="$(date -u +%F)"
          fi
          out="akp-report-${today}.json"
          python manta-hub/scripts/akp_report.py --json > "$out"
          echo "report_path=${out}" >> "$GITHUB_OUTPUT"
          echo "report_date=${today}" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: steps.checkout_hub.outcome == 'success' && steps.report.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: akp-daily-report-${{ steps.report.outputs.report_date }}
          path: akp-report-*.json
          retention-days: 90
          if-no-files-found: warn
