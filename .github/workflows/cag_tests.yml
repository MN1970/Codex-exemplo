name: CAG Tests & Quality

on:
  push:
    branches:
      - cag*
  pull_request:
    branches:
      - cag*

jobs:
  test:
    name: Unit & E2E Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cag/requirements.txt

      - name: Run unit and E2E tests
        run: |
          pytest cag/tests/ -v --junit-xml=test-results-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml

  lint:
    name: Code Quality (pylint)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cag/requirements.txt
          pip install pylint

      - name: Run pylint
        run: |
          pylint cag/ --disable=C0111,C0103 --exit-zero > pylint-report.txt || true
        continue-on-error: true

      - name: Upload pylint report
        uses: actions/upload-artifact@v3
        with:
          name: pylint-report
          path: pylint-report.txt

  schema-validation:
    name: SQL Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SQL syntax
        run: |
          python -c "
          import re
          with open('cag/schemas/cag_schema.sql', 'r') as f:
              content = f.read()

          # Validações básicas
          checks = [
              ('BEGIN;' in content, 'Missing BEGIN transaction'),
              ('COMMIT;' in content, 'Missing COMMIT'),
              (content.count('CREATE TABLE') >= 7, 'Expected at least 7 tables'),
              ('cag_intent_models' in content, 'Missing cag_intent_models table'),
              ('cag_agent_scores' in content, 'Missing cag_agent_scores table'),
              ('cag_feedback_logs' in content, 'Missing cag_feedback_logs table'),
              ('cag_routing_metrics' in content, 'Missing cag_routing_metrics table'),
              ('cag_agent_pool' in content, 'Missing cag_agent_pool table'),
              ('cag_intent_classes' in content, 'Missing cag_intent_classes table'),
              ('cag_query_cache' in content, 'Missing cag_query_cache table'),
          ]

          failures = [msg for passed, msg in checks if not passed]
          if failures:
              for msg in failures:
                  print(f'ERROR: {msg}')
              exit(1)
          else:
              print('✓ All schema validations passed')
          "

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cag/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest cag/tests/ \
            --cov=cag \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/

  comment-pr:
    name: Comment Results on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [test, lint, coverage]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Parse test results and create comment
        id: comment_body
        run: |
          python -c "
          import os
          import glob

          test_files = glob.glob('test-results-*/test-results-*.xml')

          comment = '## CAG CI Results\\n\\n'
          comment += '| Component | Status |\\n'
          comment += '|-----------|--------|\\n'

          # Test status
          comment += '| Unit & E2E Tests | ✅ Passed |\\n'

          # Lint status
          if os.path.exists('pylint-report/pylint-report.txt'):
              comment += '| Code Quality (pylint) | ✅ Checked |\\n'

          # Schema validation
          comment += '| SQL Schema | ✅ Valid |\\n'

          # Coverage status
          comment += '| Coverage Report | 📊 Generated |\\n'

          comment += '\\n### Artifacts Generated\\n'
          comment += '- Test Results (Python 3.10, 3.11, 3.12)\\n'
          comment += '- Coverage Report\\n'
          comment += '- Pylint Quality Report\\n'

          with open('COMMENT_BODY.md', 'w') as f:
              f.write(comment)
          print(comment)
          "

      - name: Comment on PR
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('COMMENT_BODY.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
